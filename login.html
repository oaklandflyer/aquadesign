<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Aqua Design Collective</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/ADC Logo.png">
  <style>
    :root {
      --ink: #0b1f2a;
      --reef: #2aa6a0;
      --paper: #0f1114;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Bricolage Grotesque", system-ui, sans-serif;
      background: var(--paper);
      color: rgba(255,255,255,.92);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: calc(var(--radius) + 8px);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.8rem;
    }
    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
    }
    .logo strong {
      font-size: 1.05rem;
      font-weight: 750;
    }
    h1 {
      font-size: 1.55rem;
      letter-spacing: -0.01em;
      margin-bottom: .4rem;
    }
    .sub {
      color: rgba(255,255,255,.60);
      margin-bottom: 1.8rem;
      font-size: .95rem;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: .5rem;
      color: rgba(255,255,255,.88);
    }
    input {
      width: 100%;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.94);
      border-radius: 12px;
      padding: .9rem 1rem;
      font: inherit;
      margin-bottom: 1.1rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: rgba(42,166,160,.70); }
    .btn {
      width: 100%;
      padding: .92rem;
      background: var(--reef);
      color: #062022;
      font: inherit;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn:hover { background: #2bb7b0; }
    .btn:active { transform: translateY(1px); }
    .error {
      display: none;
      color: rgba(255,140,140,.9);
      font-size: .9rem;
      margin-top: .9rem;
      font-weight: 600;
    }
    .error.show { display: block; }
    .back {
      display: block;
      text-align: center;
      margin-top: 1.2rem;
      color: rgba(255,255,255,.50);
      font-size: .9rem;
      text-decoration: none;
    }
    .back:hover { color: rgba(255,255,255,.80); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="assets/ADC Logo.png" alt="ADC Logo" onerror="this.style.display='none'">
      <strong>Aqua Design Collective</strong>
    </div>
    <h1>Admin Login</h1>
    <p class="sub">Sign in to manage your gallery photos.</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@email.com" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button class="btn" id="loginBtn">Sign In</button>
    <div class="error" id="err"></div>
    <a class="back" href="index.html">← Back to site</a>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    // ⚠️ PASTE YOUR KEYS HERE (keep this file out of public GitHub repos)
    const SUPABASE_URL = 'https://akeifjqujqjfbcutawij.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable__0RE4Dc9aqKVIjGmCZFmJg_WK0RKH8f';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const err = document.getElementById('err');

    // If already logged in, skip to admin
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'admin.html';

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      err.classList.remove('show');

      if (!email || !password) {
        err.textContent = 'Please enter your email and password.';
        err.classList.add('show');
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        err.textContent = 'Incorrect email or password.';
        err.classList.add('show');
      } else {
        window.location.href = 'admin.html';
      }
    });

    // Allow Enter key
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
