<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Aqua Design Collective</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/ADC Logo.png">
  <style>
    :root {
      --reef: #2aa6a0;
      --paper: #0f1114;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Bricolage Grotesque", system-ui, sans-serif;
      background: var(--paper);
      color: rgba(255,255,255,.92);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }
    .container { width: min(1000px, 100%); margin: 0 auto; }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,.10);
      margin-bottom: 2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .topbar-left { display: flex; align-items: center; gap: .75rem; }
    .topbar-left img { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; }
    .topbar-left strong { font-size: 1.05rem; font-weight: 750; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .7rem 1.2rem;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .14s, transform .1s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-cta { background: var(--reef); color: #062022; border: none; }
    .btn-cta:hover { background: #2bb7b0; }
    .btn-ghost { background: transparent; border-color: rgba(255,255,255,.18); color: rgba(255,255,255,.80); }
    .btn-ghost:hover { background: rgba(255,255,255,.06); }
    .btn-danger { background: transparent; border-color: rgba(255,100,100,.30); color: rgba(255,140,140,.85); }
    .btn-danger:hover { background: rgba(255,100,100,.08); }

    h1 { font-size: 1.75rem; letter-spacing: -.01em; margin-bottom: .3rem; }
    .sub { color: rgba(255,255,255,.58); margin-bottom: 2rem; }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed rgba(42,166,160,.40);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      margin-bottom: 2rem;
      background: rgba(42,166,160,.04);
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--reef); background: rgba(42,166,160,.08); }
    .upload-zone .icon { font-size: 2.4rem; margin-bottom: .6rem; }
    .upload-zone p { color: rgba(255,255,255,.65); margin-top: .4rem; font-size: .95rem; }
    .upload-zone strong { color: rgba(255,255,255,.90); }
    #fileInput { display: none; }

    /* Progress */
    .progress-wrap { display: none; margin-bottom: 1.5rem; }
    .progress-wrap.show { display: block; }
    .progress-bar-bg {
      background: rgba(255,255,255,.10);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      margin-top: .5rem;
    }
    .progress-bar {
      height: 100%;
      background: var(--reef);
      border-radius: 999px;
      width: 0%;
      transition: width .2s;
    }
    .progress-label { font-size: .88rem; color: rgba(255,255,255,.60); font-weight: 600; }

    /* Gallery grid */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.1rem;
    }
    .section-head h2 { font-size: 1.2rem; font-weight: 750; }
    .count { color: rgba(255,255,255,.48); font-size: .92rem; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .photo-card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 4/3;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .2s;
    }
    .photo-card:hover img { transform: scale(1.03); }
    .photo-card .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .18s;
    }
    .photo-card:hover .overlay { opacity: 1; }

    .empty {
      color: rgba(255,255,255,.38);
      text-align: center;
      padding: 3rem 0;
      font-size: .98rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30,40,50,.95);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.90);
      padding: .75rem 1.4rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: .95rem;
      transition: transform .22s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { border-color: rgba(42,166,160,.50); color: rgba(42,166,160,.95); }
    .toast.err { border-color: rgba(255,140,140,.40); color: rgba(255,140,140,.90); }

    #loading { text-align: center; padding: 3rem 0; color: rgba(255,255,255,.38); }
  </style>
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="topbar-left">
        <img src="assets/ADC Logo.png" alt="" onerror="this.style.display='none'">
        <strong>Aqua Design Collective</strong>
      </div>
      <div style="display:flex; gap:.6rem;">
        <a class="btn btn-ghost" href="index.html" target="_blank">View Site</a>
        <button class="btn btn-ghost" id="logoutBtn">Sign Out</button>
      </div>
    </div>

    <h1>Gallery Manager</h1>
    <p class="sub">Upload, manage, and remove photos from your public gallery.</p>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
      <div class="icon">🌊</div>
      <strong>Drop photos here or click to upload</strong>
      <p>JPG, PNG, WEBP — multiple files supported</p>
      <input type="file" id="fileInput" accept="image/*" multiple />
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel">Uploading...</div>
      <div class="progress-bar-bg">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <!-- Gallery -->
    <div class="section-head">
      <h2>Current Photos</h2>
      <span class="count" id="photoCount"></span>
    </div>

    <div id="loading">Loading photos...</div>
    <div class="gallery" id="gallery" style="display:none"></div>
    <div class="empty" id="empty" style="display:none">No photos yet. Upload your first one above.</div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    // ⚠️ PASTE YOUR KEYS HERE
    const SUPABASE_URL = 'https://akeifjqujqjfbcutawij.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable__0RE4Dc9aqKVIjGmCZFmJg_WK0RKH8f';
    const BUCKET = 'gallery';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Auth guard — redirect to login if not signed in
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) window.location.href = 'login.html';

    // Sign out
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });

    // Toast helper
    let toastTimer;
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Load gallery
    async function loadGallery() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('gallery').style.display = 'none';
      document.getElementById('empty').style.display = 'none';

      const { data, error } = await supabase.storage.from(BUCKET).list('', {
        limit: 200,
        sortBy: { column: 'created_at', order: 'desc' }
      });

      document.getElementById('loading').style.display = 'none';

      if (error || !data || data.length === 0) {
        document.getElementById('empty').style.display = 'block';
        document.getElementById('photoCount').textContent = '0 photos';
        return;
      }

      const photos = data.filter(f => f.name !== '.emptyFolderPlaceholder');
      document.getElementById('photoCount').textContent = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;

      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      gallery.style.display = 'grid';

      photos.forEach(file => {
        const { data: { publicUrl } } = supabase.storage.from(BUCKET).getPublicUrl(file.name);

        const card = document.createElement('div');
        card.className = 'photo-card';
        card.innerHTML = `
          <img src="${publicUrl}" alt="${file.name}" loading="lazy" />
          <div class="overlay">
            <button class="btn btn-danger" data-name="${file.name}">Delete</button>
          </div>
        `;
        gallery.appendChild(card);
      });

      // Delete handlers
      gallery.querySelectorAll('[data-name]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const name = btn.dataset.name;
          if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
          const { error } = await supabase.storage.from(BUCKET).remove([name]);
          if (error) { showToast('Delete failed.', 'err'); return; }
          showToast('Photo deleted.', 'ok');
          loadGallery();
        });
      });

      if (photos.length === 0) {
        gallery.style.display = 'none';
        document.getElementById('empty').style.display = 'block';
      }
    }

    loadGallery();

    // Upload zone
    const zone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');

    zone.addEventListener('click', () => fileInput.click());
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    async function handleFiles(files) {
      if (!files || files.length === 0) return;

      const progressWrap = document.getElementById('progressWrap');
      const progressBar = document.getElementById('progressBar');
      const progressLabel = document.getElementById('progressLabel');

      progressWrap.classList.add('show');
      let completed = 0;

      for (const file of files) {
        const ext = file.name.split('.').pop();
        const filename = `${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;

        progressLabel.textContent = `Uploading ${file.name}...`;

        const { error } = await supabase.storage.from(BUCKET).upload(filename, file, {
          cacheControl: '3600',
          upsert: false
        });

        if (error) {
          showToast(`Failed: ${file.name}`, 'err');
        }

        completed++;
        progressBar.style.width = `${(completed / files.length) * 100}%`;
      }

      progressLabel.textContent = 'Done!';
      setTimeout(() => {
        progressWrap.classList.remove('show');
        progressBar.style.width = '0%';
      }, 1500);

      showToast(`${completed} photo${completed !== 1 ? 's' : ''} uploaded!`, 'ok');
      fileInput.value = '';
      loadGallery();
    }
  </script>
</body>
</html>
